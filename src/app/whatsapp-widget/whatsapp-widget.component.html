<div class="wa-container">
  
  <div class="wa-popup" *ngIf="isOpen">
    <div class="wa-header">
      <div class="wa-header-title">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M12.031 0C5.383 0 0 5.383 0 12.031c0 2.124.553 4.195 1.604 6.012L.211 23.789l5.908-1.55a11.956 11.956 0 005.912 1.564h.005c6.645 0 12.028-5.383 12.028-12.031S18.676 0 12.031 0zm0 21.805c-1.796 0-3.557-.484-5.097-1.398l-.365-.216-3.791.994.996-3.696-.237-.377A9.972 9.972 0 012.003 12.03c0-5.542 4.51-10.052 10.052-10.052s10.052 4.51 10.052 10.052-4.51 10.052-10.052 10.052z"/></svg>
        <span>WhatsApp Vancity</span>
      </div>
      <button class="wa-close-btn" (click)="toggleChat()">×</button>
    </div>
    
    <div class="wa-body">
      <p class="wa-subtitle">● Online</p>
      <p class="wa-instructions">Fill in your details to chat with an advisor.</p>
      
      <form [formGroup]="waForm" (ngSubmit)="iniciarChat()">
        <div class="wa-input-group">
          <input type="text" formControlName="nombre" placeholder="FullName">
        </div>
        <div class="wa-input-group">
          <input type="tel" formControlName="telefono" placeholder="WhatsApp">
        </div>
        <div class="wa-input-group">
          <input type="email" formControlName="correo" placeholder="Email (Opcional)">
        </div>
        <div class="wa-input-group">
          <textarea formControlName="mensaje" placeholder="How can we help you?" rows="2"></textarea>
        </div>
        
        <button type="submit" class="wa-submit-btn">Start Chat</button>
      </form>
    </div>
  </div>

  <button class="wa-fab" (click)="toggleChat()" *ngIf="!isOpen">
    <svg viewBox="0 0 24 24" width="35" height="35" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.487-1.761-1.66-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </button>

</div>
